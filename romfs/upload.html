<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3DS EPUB Upload</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    background: #1a1a2e;
    color: #faf8f0;
  }
  h1 { color: #4a90d9; margin-bottom: 8px; }
  p.sub { color: #888; margin-top: 0; }
  form {
    background: #2a2a4a;
    padding: 24px;
    border-radius: 8px;
    border: 1px solid #3a3a5c;
  }
  input[type=file] {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    background: #1a1a2e;
    color: #faf8f0;
    border: 1px dashed #4a90d9;
    border-radius: 4px;
  }
  input[type=submit] {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background: #4a90d9;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  input[type=submit]:hover { background: #3a70b0; }
  #status { margin-top: 16px; padding: 8px; }
</style>
</head>
<body>
  <h1>3DS EPUB Upload</h1>
  <p class="sub">Upload EPUB files to your 3DS library</p>
  <form method="POST" enctype="multipart/form-data" action="/upload">
    <input type="file" name="epub" accept=".epub" required>
    <input type="submit" value="Upload to 3DS">
  </form>
  <div id="status"></div>
</body>
</html>
